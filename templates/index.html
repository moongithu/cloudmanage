<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量服务器管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans SC', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5',
                            700: '#4338ca', 800: '#3730a3', 900: '#312e81',
                        },
                        dark: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0',
                            300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b',
                            600: '#475569', 700: '#334155', 800: '#1e293b',
                            900: '#0f172a', 950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0f172a;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(100, 116, 139, 0.2);
        }

        .glow {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        .code-editor {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            tab-size: 4;
            resize: none;
            background: #020617;
            color: #e2e8f0;
        }

        .code-editor:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.4);
        }

        .code-editor::placeholder {
            color: #475569;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade {
            animation: fadeIn 0.3s ease-out;
        }

        .server-card {
            transition: all 0.15s ease;
        }

        .server-card:hover {
            background: rgba(99, 102, 241, 0.08);
        }

        .server-card.selected {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
            transform: translateY(-1px);
        }

        .btn-glow:active {
            transform: translateY(0);
        }

        .group-header {
            transition: all 0.15s ease;
        }

        .group-header:hover {
            background: rgba(99, 102, 241, 0.06);
        }

        .drop-zone {
            border: 2px dashed #475569;
            transition: all 0.2s;
        }

        .drop-zone.dragover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.08);
        }
    </style>
</head>

<body class="min-h-screen text-gray-200">

    <!-- 顶部导航 -->
    <header class="glass sticky top-0 z-50 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div
                class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-lg">
                <i class="fas fa-server text-white text-sm"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-white tracking-tight">Server Commander</h1>
                <p class="text-xs text-slate-300">批量服务器管理</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span id="serverCount" class="text-xs text-slate-300"><i
                    class="fas fa-circle text-green-500 text-[8px] mr-1"></i>0 台服务器</span>
            <button onclick="showModal('pwdModal')" class="text-xs text-slate-300 hover:text-brand-400 transition-colors"
                title="修改密码">
                <i class="fas fa-key mr-1"></i>密码
            </button>
            <button onclick="doLogout()" class="text-xs text-slate-300 hover:text-red-400 transition-colors"
                title="退出登录">
                <i class="fas fa-sign-out-alt mr-1"></i>退出
            </button>
        </div>
    </header>

    <!-- 主体 -->
    <main class="flex h-[calc(100vh-60px)]">

        <!-- ===== 左侧: 服务器树 ===== -->
        <aside class="w-80 flex-shrink-0 border-r border-dark-700/50 flex flex-col">
            <div class="p-3 border-b border-dark-700/50">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-xs font-bold text-slate-300 uppercase tracking-wider"><i
                            class="fas fa-hdd mr-1.5 text-brand-400"></i>服务器</h2>
                    <div class="flex gap-0.5">
                        <button onclick="showCreateGroupModal()"
                            class="p-1.5 rounded-lg text-slate-400 hover:text-amber-400 hover:bg-dark-800 transition"
                            title="新建分组">
                            <i class="fas fa-folder-plus text-xs"></i>
                        </button>
                        <button onclick="showImportModal()"
                            class="p-1.5 rounded-lg text-slate-400 hover:text-brand-400 hover:bg-dark-800 transition"
                            title="导入">
                            <i class="fas fa-file-import text-xs"></i>
                        </button>
                        <button onclick="showAddServerModal()"
                            class="p-1.5 rounded-lg text-slate-400 hover:text-green-400 hover:bg-dark-800 transition"
                            title="添加">
                            <i class="fas fa-plus text-xs"></i>
                        </button>
                    </div>
                </div>
                <div class="flex gap-1.5">
                    <button onclick="selectAllServers()"
                        class="flex-1 text-[11px] py-1 px-2 rounded-md bg-dark-800 hover:bg-dark-700 text-slate-300 hover:text-white transition">全选</button>
                    <button onclick="deselectAllServers()"
                        class="flex-1 text-[11px] py-1 px-2 rounded-md bg-dark-800 hover:bg-dark-700 text-slate-300 hover:text-white transition">取消</button>
                </div>
            </div>
            <div id="serverTree" class="flex-1 overflow-y-auto p-2 text-sm">
                <div class="text-center text-slate-400 text-xs py-12"><i
                        class="fas fa-inbox text-2xl mb-2 block text-dark-600"></i>暂无服务器</div>
            </div>
        </aside>

        <!-- ===== 中间: 编辑区 ===== -->
        <section class="flex-1 flex flex-col min-w-0">
            <div class="flex items-center border-b border-dark-700/50 px-4">
                <button onclick="switchMode('command')" id="tab-command"
                    class="mode-tab px-4 py-2.5 text-sm font-medium border-b-2 border-brand-500 text-brand-400 transition"><i
                        class="fas fa-terminal mr-1.5"></i>命令</button>
                <button onclick="switchMode('snippet')" id="tab-snippet"
                    class="mode-tab px-4 py-2.5 text-sm font-medium border-b-2 border-transparent text-slate-300 hover:text-white transition"><i
                        class="fas fa-code mr-1.5"></i>代码片段</button>
                <button onclick="switchMode('script')" id="tab-script"
                    class="mode-tab px-4 py-2.5 text-sm font-medium border-b-2 border-transparent text-slate-300 hover:text-white transition"><i
                        class="fas fa-file-code mr-1.5"></i>脚本库</button>
                <div class="flex-1"></div>
                <button onclick="executeTask()" id="btnExecute"
                    class="btn-glow px-5 py-1.5 bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white text-sm font-bold rounded-xl transition-all duration-200 shadow-lg">
                    <i class="fas fa-play mr-1.5"></i>执行
                </button>
            </div>

            <!-- 命令模式 -->
            <div id="mode-command" class="flex-1 flex flex-col">
                <div class="p-4 flex-1 flex flex-col">
                    <label class="text-xs text-slate-300 mb-2 font-medium">输入要执行的命令</label>
                    <textarea id="commandInput"
                        class="code-editor flex-1 w-full rounded-xl p-4 border border-dark-700/50"
                        placeholder="hostname && uptime && df -h"></textarea>
                </div>
                {% raw %}<div class="px-4 pb-3">
                    <p class="text-[11px] text-slate-400 mb-1.5">快捷命令:</p>
                    <div class="flex flex-wrap gap-1.5">
                        <button onclick="quickCmd('hostname && uptime')"
                            class="text-[11px] px-2.5 py-1 rounded-md bg-dark-800 hover:bg-dark-700 text-slate-300 hover:text-white transition"><i
                                class="fas fa-info-circle mr-1 text-blue-400"></i>主机</button>
                        <button onclick="quickCmd('df -h')"
                            class="text-[11px] px-2.5 py-1 rounded-md bg-dark-800 hover:bg-dark-700 text-slate-300 hover:text-white transition"><i
                                class="fas fa-hard-drive mr-1 text-yellow-400"></i>磁盘</button>
                        <button onclick="quickCmd('free -h')"
                            class="text-[11px] px-2.5 py-1 rounded-md bg-dark-800 hover:bg-dark-700 text-slate-300 hover:text-white transition"><i
                                class="fas fa-memory mr-1 text-green-400"></i>内存</button>
                        <button
                            onclick="quickCmd('docker ps --format &quot;table {{.Names}}\\t{{.Status}}\\t{{.Ports}}&quot;')"
                            class="text-[11px] px-2.5 py-1 rounded-md bg-dark-800 hover:bg-dark-700 text-slate-300 hover:text-white transition"><i
                                class="fab fa-docker mr-1 text-cyan-400"></i>Docker</button>
                        <button onclick="quickCmd('ss -tlnp')"
                            class="text-[11px] px-2.5 py-1 rounded-md bg-dark-800 hover:bg-dark-700 text-slate-300 hover:text-white transition"><i
                                class="fas fa-network-wired mr-1 text-purple-400"></i>端口</button>
                        <button onclick="quickCmd('cat /etc/os-release | head -5')"
                            class="text-[11px] px-2.5 py-1 rounded-md bg-dark-800 hover:bg-dark-700 text-slate-300 hover:text-white transition"><i
                                class="fab fa-linux mr-1 text-orange-400"></i>系统</button>
                    </div>
                </div>{% endraw %}
            </div>

            <!-- 代码片段模式 -->
            <div id="mode-snippet" class="flex-1 flex-col hidden">
                <div class="p-4 flex-1 flex flex-col">
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-xs text-slate-300 font-medium">编写 Shell 代码片段</label>
                        <div class="flex gap-1.5">
                            <button onclick="showSaveSnippetModal()"
                                class="text-[11px] px-2.5 py-1 rounded-md bg-dark-800 hover:bg-dark-700 text-slate-300 hover:text-white transition"><i
                                    class="fas fa-star mr-1 text-amber-400"></i>收藏</button>
                        </div>
                    </div>
                    <textarea id="snippetInput"
                        class="code-editor flex-1 w-full rounded-xl p-4 border border-dark-700/50"
                        placeholder="#!/bin/bash&#10;echo &quot;Hello&quot;"></textarea>
                </div>
                <!-- 收藏列表 -->
                <div class="px-4 pb-3 border-t border-dark-700/30">
                    <p class="text-[11px] text-slate-400 my-2"><i class="fas fa-star text-amber-400 mr-1"></i>收藏片段:</p>
                    <div id="snippetList" class="flex flex-wrap gap-1.5 max-h-24 overflow-y-auto">
                        <span class="text-[11px] text-dark-600">暂无收藏</span>
                    </div>
                </div>
            </div>

            <!-- 脚本库模式 -->
            <div id="mode-script" class="flex-1 flex-col hidden">
                <div class="p-4 flex-1 flex flex-col">
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-xs text-slate-300 font-medium">脚本库</label>
                        <div class="flex gap-1.5">
                            <button onclick="document.getElementById('scriptUpload').click()"
                                class="text-[11px] px-2.5 py-1 rounded-md bg-dark-800 hover:bg-dark-700 text-slate-300 hover:text-white transition"><i
                                    class="fas fa-upload mr-1 text-blue-400"></i>上传脚本</button>
                            <input type="file" id="scriptUpload" class="hidden" accept=".sh,.py,.bash,.pl,.txt" multiple
                                onchange="uploadScripts(this.files)">
                        </div>
                    </div>
                    <!-- 上传拖拽区 -->
                    <div id="dropZone" class="drop-zone rounded-xl p-4 mb-3 text-center cursor-pointer"
                        onclick="document.getElementById('scriptUpload').click()"
                        ondragover="event.preventDefault();this.classList.add('dragover')"
                        ondragleave="this.classList.remove('dragover')"
                        ondrop="event.preventDefault();this.classList.remove('dragover');uploadScripts(event.dataTransfer.files)">
                        <i class="fas fa-cloud-arrow-up text-slate-400 text-lg"></i>
                        <p class="text-[11px] text-slate-400 mt-1">拖拽脚本文件到这里，或点击上传</p>
                    </div>
                    <div id="scriptList" class="space-y-1 mb-3 max-h-36 overflow-y-auto"></div>
                    <label class="text-xs text-slate-300 mb-2 font-medium">脚本预览</label>
                    <textarea id="scriptPreview"
                        class="code-editor flex-1 w-full rounded-xl p-4 border border-dark-700/50" readonly
                        placeholder="选择脚本以预览..."></textarea>
                </div>
            </div>
        </section>

        <!-- ===== 右侧: 结果 ===== -->
        <aside class="w-96 flex-shrink-0 border-l border-dark-700/50 flex flex-col">
            <div class="p-3 border-b border-dark-700/50 flex items-center justify-between">
                <h2 class="text-xs font-bold text-slate-300 uppercase tracking-wider"><i
                        class="fas fa-chart-bar mr-1.5 text-brand-400"></i>执行结果</h2>
                <span id="resultSummary" class="text-xs text-slate-400"></span>
            </div>
            <div id="resultPanel" class="flex-1 overflow-y-auto p-3 space-y-2">
                <div class="text-center text-slate-400 text-xs py-12"><i
                        class="fas fa-rocket text-2xl mb-2 block text-dark-600"></i>选择服务器并执行任务</div>
            </div>
        </aside>
    </main>

    <!-- ===== 添加服务器弹窗 ===== -->
    <div id="addServerModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center"
        onclick="if(event.target===this)closeModal('addServerModal')">
        <div class="glass rounded-2xl p-5 w-[400px] glow animate-fade">
            <h3 class="text-base font-bold text-white mb-3"><i class="fas fa-plus-circle text-green-400 mr-2"></i>添加服务器
            </h3>
            <div class="space-y-2.5">
                <div class="flex gap-2.5">
                    <div class="flex-1">
                        <label class="text-[11px] text-slate-300 mb-0.5 block">主机 IP</label>
                        <input id="addHost" type="text" placeholder="192.168.1.1"
                            class="w-full px-3 py-1.5 rounded-lg bg-dark-900 border border-dark-700 text-white text-sm focus:border-brand-500 focus:outline-none">
                    </div>
                    <div class="w-20">
                        <label class="text-[11px] text-slate-300 mb-0.5 block">端口</label>
                        <input id="addPort" type="number" value="22"
                            class="w-full px-3 py-1.5 rounded-lg bg-dark-900 border border-dark-700 text-white text-sm focus:border-brand-500 focus:outline-none">
                    </div>
                </div>
                <div class="flex gap-2.5">
                    <div class="flex-1">
                        <label class="text-[11px] text-slate-300 mb-0.5 block">用户名</label>
                        <input id="addUser" type="text" value="root"
                            class="w-full px-3 py-1.5 rounded-lg bg-dark-900 border border-dark-700 text-white text-sm focus:border-brand-500 focus:outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="text-[11px] text-slate-300 mb-0.5 block">密码</label>
                        <input id="addPass" type="password" placeholder="••••••"
                            class="w-full px-3 py-1.5 rounded-lg bg-dark-900 border border-dark-700 text-white text-sm focus:border-brand-500 focus:outline-none">
                    </div>
                </div>
                <div class="flex gap-2.5">
                    <div class="flex-1">
                        <label class="text-[11px] text-slate-300 mb-0.5 block">标签 (可选)</label>
                        <input id="addLabel" type="text" placeholder="Web-01"
                            class="w-full px-3 py-1.5 rounded-lg bg-dark-900 border border-dark-700 text-white text-sm focus:border-brand-500 focus:outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="text-[11px] text-slate-300 mb-0.5 block">分组</label>
                        <select id="addGroup"
                            class="w-full px-3 py-1.5 rounded-lg bg-dark-900 border border-dark-700 text-white text-sm focus:border-brand-500 focus:outline-none">
                            <option value="">未分组</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-4">
                <button onclick="closeModal('addServerModal')"
                    class="px-3 py-1.5 rounded-lg text-slate-300 hover:text-white hover:bg-dark-700 text-sm transition">取消</button>
                <button onclick="addServer()"
                    class="px-4 py-1.5 rounded-xl bg-gradient-to-r from-green-600 to-green-500 text-white text-sm font-bold transition shadow-lg"><i
                        class="fas fa-check mr-1"></i>添加</button>
            </div>
        </div>
    </div>

    <!-- ===== 分组弹窗 ===== -->
    <div id="groupModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center"
        onclick="if(event.target===this)closeModal('groupModal')">
        <div class="glass rounded-2xl p-5 w-[360px] glow animate-fade">
            <h3 class="text-base font-bold text-white mb-3"><i class="fas fa-folder-plus text-amber-400 mr-2"></i>新建分组
            </h3>
            <div class="space-y-2.5">
                <div>
                    <label class="text-[11px] text-slate-300 mb-0.5 block">分组名称</label>
                    <input id="groupName" type="text" placeholder="例: 生产环境"
                        class="w-full px-3 py-1.5 rounded-lg bg-dark-900 border border-dark-700 text-white text-sm focus:border-brand-500 focus:outline-none">
                </div>
                <div>
                    <label class="text-[11px] text-slate-300 mb-0.5 block">父级分组</label>
                    <select id="groupParent"
                        class="w-full px-3 py-1.5 rounded-lg bg-dark-900 border border-dark-700 text-white text-sm focus:border-brand-500 focus:outline-none">
                        <option value="">顶层</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-4">
                <button onclick="closeModal('groupModal')"
                    class="px-3 py-1.5 rounded-lg text-slate-300 hover:text-white hover:bg-dark-700 text-sm transition">取消</button>
                <button onclick="createGroup()"
                    class="px-4 py-1.5 rounded-xl bg-gradient-to-r from-amber-600 to-amber-500 text-white text-sm font-bold transition shadow-lg"><i
                        class="fas fa-check mr-1"></i>创建</button>
            </div>
        </div>
    </div>

    <!-- ===== 导入弹窗 ===== -->
    <div id="importModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center"
        onclick="if(event.target===this)closeModal('importModal')">
        <div class="glass rounded-2xl p-5 w-[460px] glow animate-fade">
            <h3 class="text-base font-bold text-white mb-3"><i class="fas fa-file-import text-brand-400 mr-2"></i>导入服务器
            </h3>
            <div class="space-y-2.5">
                <button onclick="importFromFile()"
                    class="w-full text-left px-3 py-2.5 rounded-xl bg-dark-800 hover:bg-dark-700 transition group">
                    <div class="text-sm font-medium text-white group-hover:text-brand-400"><i
                            class="fas fa-file-alt mr-2 text-brand-400"></i>从 serverInfo 文件导入</div>
                    <div class="text-[11px] text-slate-400 mt-0.5 ml-6">自动读取同目录下的 serverInfo 文件</div>
                </button>
                <div>
                    <p class="text-[11px] text-slate-300 mb-1.5">或粘贴 (<span class="text-brand-400 font-mono">IP 端口 用户
                            密码</span>)</p>
                    <textarea id="importText" class="code-editor w-full h-24 rounded-xl p-3 border border-dark-700/50"
                        placeholder="1.1.1.1 22 root pwd123"></textarea>
                </div>
                <div>
                    <label class="text-[11px] text-slate-300 mb-0.5 block">导入到分组</label>
                    <select id="importGroup"
                        class="w-full px-3 py-1.5 rounded-lg bg-dark-900 border border-dark-700 text-white text-sm focus:border-brand-500 focus:outline-none">
                        <option value="">未分组</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-4">
                <button onclick="closeModal('importModal')"
                    class="px-3 py-1.5 rounded-lg text-slate-300 hover:text-white hover:bg-dark-700 text-sm transition">取消</button>
                <button onclick="importFromText()"
                    class="px-4 py-1.5 rounded-xl bg-gradient-to-r from-brand-600 to-brand-500 text-white text-sm font-bold transition shadow-lg"><i
                        class="fas fa-download mr-1"></i>导入</button>
            </div>
        </div>
    </div>

    <!-- ===== 收藏片段弹窗 ===== -->
    <div id="saveSnippetModal"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center"
        onclick="if(event.target===this)closeModal('saveSnippetModal')">
        <div class="glass rounded-2xl p-5 w-[360px] glow animate-fade">
            <h3 class="text-base font-bold text-white mb-3"><i class="fas fa-star text-amber-400 mr-2"></i>收藏代码片段</h3>
            <div>
                <label class="text-[11px] text-slate-300 mb-0.5 block">片段名称</label>
                <input id="snippetName" type="text" placeholder="例: 检查磁盘"
                    class="w-full px-3 py-1.5 rounded-lg bg-dark-900 border border-dark-700 text-white text-sm font-mono focus:border-brand-500 focus:outline-none">
            </div>
            <div class="flex justify-end gap-2 mt-4">
                <button onclick="closeModal('saveSnippetModal')"
                    class="px-3 py-1.5 rounded-lg text-slate-300 hover:text-white hover:bg-dark-700 text-sm transition">取消</button>
                <button onclick="doSaveSnippet()"
                    class="px-4 py-1.5 rounded-xl bg-gradient-to-r from-amber-600 to-amber-500 text-white text-sm font-bold transition shadow-lg"><i
                        class="fas fa-star mr-1"></i>收藏</button>
            </div>
        </div>
    </div>

    <!-- ===== 结果详情弹窗 ===== -->
    <div id="detailModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center"
        onclick="if(event.target===this)closeModal('detailModal')">
        <div class="glass rounded-2xl p-5 w-[700px] max-h-[80vh] flex flex-col glow animate-fade">
            <div class="flex items-center justify-between mb-3">
                <h3 id="detailTitle" class="text-base font-bold text-white"><i
                        class="fas fa-terminal text-brand-400 mr-2"></i>执行详情</h3>
                <button onclick="closeModal('detailModal')"
                    class="p-1.5 rounded-lg text-slate-300 hover:text-white hover:bg-dark-700 transition"><i
                        class="fas fa-times"></i></button>
            </div>
            <pre id="detailOutput"
                class="flex-1 overflow-auto code-editor rounded-xl p-4 border border-dark-700/50 text-sm whitespace-pre-wrap"></pre>
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div id="pwdModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center"
        onclick="if(event.target===this)closeModal('pwdModal')">
        <div class="glass rounded-2xl p-5 w-96 glow animate-fade">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-base font-bold text-white"><i class="fas fa-key text-brand-400 mr-2"></i>修改密码</h3>
                <button onclick="closeModal('pwdModal')"
                    class="p-1.5 rounded-lg text-slate-300 hover:text-white hover:bg-dark-700 transition"><i
                        class="fas fa-times"></i></button>
            </div>
            <div class="space-y-3">
                <input type="password" id="oldPwd" placeholder="当前密码"
                    class="w-full px-3 py-2 bg-dark-800/50 border border-dark-600 rounded-lg text-sm text-white placeholder-slate-500 focus:border-brand-500 focus:outline-none">
                <input type="password" id="newPwd" placeholder="新密码（至少4位）"
                    class="w-full px-3 py-2 bg-dark-800/50 border border-dark-600 rounded-lg text-sm text-white placeholder-slate-500 focus:border-brand-500 focus:outline-none">
                <input type="password" id="newPwd2" placeholder="确认新密码"
                    class="w-full px-3 py-2 bg-dark-800/50 border border-dark-600 rounded-lg text-sm text-white placeholder-slate-500 focus:border-brand-500 focus:outline-none">
                <button onclick="changePassword()"
                    class="w-full py-2 bg-brand-600 hover:bg-brand-500 text-white text-sm rounded-lg transition">确认修改</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-16 right-6 z-[100] hidden">
        <div class="glass rounded-xl px-4 py-2.5 animate-fade shadow-2xl flex items-center gap-2">
            <i id="toastIcon" class="fas fa-check-circle text-green-400"></i>
            <span id="toastMsg" class="text-sm text-white"></span>
        </div>
    </div>

    <script>
        // ===========================
        // 状态
        // ===========================
        let servers = [], groups = [], snippets = [];
        let selectedIds = new Set();
        let collapsedGroups = new Set();
        let currentMode = 'command', currentScript = '', pollingTimer = null;

        // 退出登录
        function doLogout() {
            if (confirm('确定退出登录？')) {
                fetch('/api/logout', { method: 'POST' })
                    .then(() => window.location.href = '/login');
            }
        }

        // 修改密码
        async function changePassword() {
            const oldPwd = document.getElementById('oldPwd').value;
            const newPwd = document.getElementById('newPwd').value;
            const newPwd2 = document.getElementById('newPwd2').value;
            if (!oldPwd || !newPwd) return showToast('请填写完整', 'error');
            if (newPwd !== newPwd2) return showToast('两次密码不一致', 'error');
            if (newPwd.length < 4) return showToast('新密码至少4位', 'error');
            try {
                const r = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ old_password: oldPwd, new_password: newPwd })
                });
                const d = await r.json();
                if (r.ok) {
                    showToast('密码修改成功');
                    closeModal('pwdModal');
                    document.getElementById('oldPwd').value = '';
                    document.getElementById('newPwd').value = '';
                    document.getElementById('newPwd2').value = '';
                } else {
                    showToast(d.error || '修改失败', 'error');
                }
            } catch { showToast('网络错误', 'error'); }
        }

        document.addEventListener('DOMContentLoaded', () => { loadAll(); });

        async function loadAll() {
            await Promise.all([loadServers(), loadGroups(), loadSnippets(), loadScripts()]);
            renderTree();
        }

        // ===========================
        // Toast & Modal
        // ===========================
        function showToast(msg, type = 'success') {
            const icons = { success: 'fa-check-circle text-green-400', error: 'fa-exclamation-circle text-red-400', info: 'fa-info-circle text-blue-400' };
            document.getElementById('toastIcon').className = `fas ${icons[type] || icons.info}`;
            document.getElementById('toastMsg').textContent = msg;
            const el = document.getElementById('toast');
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }
        function showModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }

        // ===========================
        // 分组
        // ===========================
        async function loadGroups() {
            try { const r = await fetch('/api/groups'); groups = await r.json(); } catch (e) { console.error(e); }
            populateGroupSelects();
        }

        function populateGroupSelects() {
            const selects = ['addGroup', 'groupParent', 'importGroup'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                const val = el.value;
                el.innerHTML = `<option value="">${id === 'groupParent' ? '顶层' : '未分组'}</option>`;
                const addOpts = (parentId, depth) => {
                    groups.filter(g => (g.parent_id || null) === parentId).forEach(g => {
                        el.innerHTML += `<option value="${g.id}">${'　'.repeat(depth)}${g.name}</option>`;
                        addOpts(g.id, depth + 1);
                    });
                };
                addOpts(null, 0);
                el.value = val;
            });
        }

        function showCreateGroupModal() { showModal('groupModal'); document.getElementById('groupName').focus(); }

        async function createGroup() {
            const name = document.getElementById('groupName').value.trim();
            const parent_id = document.getElementById('groupParent').value || null;
            if (!name) return showToast('请输入分组名', 'error');
            try {
                const r = await fetch('/api/groups', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, parent_id }) });
                if (r.ok) { showToast('分组已创建'); closeModal('groupModal'); document.getElementById('groupName').value = ''; await loadGroups(); renderTree(); }
            } catch (e) { showToast('创建失败', 'error'); }
        }

        async function deleteGroup(id) {
            if (!confirm('删除此分组？(服务器和子分组将保留)')) return;
            try {
                await fetch(`/api/groups/${id}`, { method: 'DELETE' });
                showToast('分组已删除');
                await Promise.all([loadGroups(), loadServers()]);
                renderTree();
            } catch (e) { showToast('删除失败', 'error'); }
        }

        // ===========================
        // 服务器
        // ===========================
        async function loadServers() {
            try { const r = await fetch('/api/servers'); servers = await r.json(); } catch (e) { console.error(e); }
            document.getElementById('serverCount').innerHTML = `<i class="fas fa-circle text-green-500 text-[8px] mr-1"></i>${servers.length} 台服务器`;
        }

        function showAddServerModal() { populateGroupSelects(); showModal('addServerModal'); document.getElementById('addHost').focus(); }
        function showImportModal() { populateGroupSelects(); showModal('importModal'); }

        async function addServer() {
            const d = {
                host: document.getElementById('addHost').value.trim(),
                port: document.getElementById('addPort').value || 22,
                user: document.getElementById('addUser').value.trim() || 'root',
                password: document.getElementById('addPass').value,
                label: document.getElementById('addLabel').value.trim(),
                group_id: document.getElementById('addGroup').value || null
            };
            if (!d.host) return showToast('请输入 IP', 'error');
            if (!d.password) return showToast('请输入密码', 'error');
            try {
                const r = await fetch('/api/servers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(d) });
                if (r.ok) { showToast('添加成功'); closeModal('addServerModal');['addHost', 'addPass', 'addLabel'].forEach(i => document.getElementById(i).value = ''); await loadServers(); renderTree(); }
            } catch (e) { showToast('添加失败', 'error'); }
        }

        async function deleteServer(id) {
            if (!confirm('确认删除？')) return;
            try { await fetch(`/api/servers/${id}`, { method: 'DELETE' }); selectedIds.delete(id); showToast('已删除'); await loadServers(); renderTree(); } catch (e) { }
        }

        async function importFromFile() {
            const group_id = document.getElementById('importGroup').value || null;
            try {
                const r = await fetch('/api/servers/import', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ group_id }) });
                const d = await r.json();
                if (r.ok) { showToast(d.message); closeModal('importModal'); await loadServers(); renderTree(); } else showToast(d.error, 'error');
            } catch (e) { showToast('导入失败', 'error'); }
        }

        async function importFromText() {
            const text = document.getElementById('importText').value.trim();
            const group_id = document.getElementById('importGroup').value || null;
            if (!text) return showToast('请粘贴服务器信息', 'error');
            try {
                const r = await fetch('/api/servers/import', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text, group_id }) });
                const d = await r.json();
                if (r.ok) { showToast(d.message); closeModal('importModal'); document.getElementById('importText').value = ''; await loadServers(); renderTree(); } else showToast(d.error, 'error');
            } catch (e) { showToast('导入失败', 'error'); }
        }

        async function testConn(id) {
            const btn = document.querySelector(`[data-test="${id}"]`);
            if (btn) btn.innerHTML = '<i class="fas fa-spinner fa-spin text-[10px]"></i>';
            try {
                const r = await fetch('/api/test-connection', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ server_id: id }) });
                const d = await r.json();
                if (d.status === 'ok') { if (btn) btn.innerHTML = '<i class="fas fa-check text-[10px] text-green-400"></i>'; showToast(`连通: ${d.output.split('\n')[0]}`); }
                else { if (btn) btn.innerHTML = '<i class="fas fa-times text-[10px] text-red-400"></i>'; showToast(`失败: ${d.error}`, 'error'); }
            } catch (e) { if (btn) btn.innerHTML = '<i class="fas fa-times text-[10px] text-red-400"></i>'; }
            setTimeout(() => { if (btn) btn.innerHTML = '<i class="fas fa-bolt text-[10px]"></i>'; }, 5000);
        }

        function toggleServer(id) { if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); renderTree(); }
        function selectAllServers() { servers.forEach(s => selectedIds.add(s.id)); renderTree(); }
        function deselectAllServers() { selectedIds.clear(); renderTree(); }

        function toggleGroup(gid) { if (collapsedGroups.has(gid)) collapsedGroups.delete(gid); else collapsedGroups.add(gid); renderTree(); }

        function selectGroupServers(gid) {
            // 选中该分组和子分组下所有服务器
            const gids = new Set([gid]);
            const addChildren = (pid) => { groups.filter(g => g.parent_id === pid).forEach(g => { gids.add(g.id); addChildren(g.id); }); };
            addChildren(gid);
            servers.filter(s => gids.has(s.group_id)).forEach(s => selectedIds.add(s.id));
            renderTree();
        }

        // ===========================
        // 树状渲染
        // ===========================
        function renderTree() {
            const el = document.getElementById('serverTree');
            if (!servers.length && !groups.length) {
                el.innerHTML = '<div class="text-center text-slate-400 text-xs py-12"><i class="fas fa-inbox text-2xl mb-2 block text-dark-600"></i>暂无服务器</div>';
                return;
            }

            let html = '';
            // 递归渲染分组
            const renderGroup = (parentId, depth) => {
                const childGroups = groups.filter(g => (g.parent_id || null) === parentId);
                const childServers = servers.filter(s => (s.group_id || null) === parentId);

                childGroups.forEach(g => {
                    const collapsed = collapsedGroups.has(g.id);
                    const groupServerCount = countGroupServers(g.id);
                    html += `<div class="mb-0.5" style="padding-left:${depth * 12}px">
                <div class="group-header flex items-center gap-1.5 px-2 py-1.5 rounded-lg cursor-pointer" onclick="toggleGroup('${g.id}')">
                    <i class="fas fa-chevron-${collapsed ? 'right' : 'down'} text-[9px] text-slate-400 w-3"></i>
                    <i class="fas fa-folder${collapsed ? '' : '-open'} text-xs text-amber-400/80"></i>
                    <span class="text-xs font-medium text-dark-300 flex-1">${esc(g.name)}</span>
                    <span class="text-[10px] text-dark-600">${groupServerCount}</span>
                    <button onclick="event.stopPropagation();selectGroupServers('${g.id}')" class="p-0.5 rounded text-dark-600 hover:text-brand-400 transition" title="全选该组">
                        <i class="fas fa-check-double text-[9px]"></i>
                    </button>
                    <button onclick="event.stopPropagation();deleteGroup('${g.id}')" class="p-0.5 rounded text-dark-600 hover:text-red-400 transition" title="删除分组">
                        <i class="fas fa-times text-[9px]"></i>
                    </button>
                </div>`;
                    if (!collapsed) {
                        renderGroup(g.id, depth + 1);
                    }
                    html += `</div>`;
                });

                childServers.forEach(s => {
                    const sel = selectedIds.has(s.id);
                    html += `<div class="server-card rounded-lg px-2 py-1.5 border border-transparent cursor-pointer ${sel ? 'selected' : ''}" style="padding-left:${depth * 12 + 8}px" onclick="toggleServer('${s.id}')">
                <div class="flex items-center gap-2">
                    <div class="w-4 h-4 rounded border-[1.5px] flex items-center justify-center ${sel ? 'bg-brand-500 border-brand-500' : 'border-dark-500'}">
                        ${sel ? '<i class="fas fa-check text-white text-[8px]"></i>' : ''}
                    </div>
                    <span class="text-xs font-mono text-white flex-1 truncate">${s.host}<span class="text-slate-400">:${s.port}</span></span>
                    ${s.label ? `<span class="text-[10px] text-slate-400 truncate max-w-[60px]">${esc(s.label)}</span>` : ''}
                    <button data-test="${s.id}" onclick="event.stopPropagation();testConn('${s.id}')" class="p-0.5 rounded text-dark-600 hover:text-yellow-400 transition" title="测试">
                        <i class="fas fa-bolt text-[10px]"></i>
                    </button>
                    <button onclick="event.stopPropagation();deleteServer('${s.id}')" class="p-0.5 rounded text-dark-600 hover:text-red-400 transition" title="删除">
                        <i class="fas fa-trash text-[10px]"></i>
                    </button>
                </div>
            </div>`;
                });
            };

            renderGroup(null, 0);
            el.innerHTML = html || '<div class="text-center text-slate-400 text-xs py-12">暂无服务器</div>';
        }

        function countGroupServers(gid) {
            let count = servers.filter(s => s.group_id === gid).length;
            groups.filter(g => g.parent_id === gid).forEach(g => { count += countGroupServers(g.id); });
            return count;
        }

        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        // ===========================
        // 模式切换
        // ===========================
        function switchMode(mode) {
            currentMode = mode;
            ['command', 'snippet', 'script'].forEach(m => {
                document.getElementById(`mode-${m}`).classList.toggle('hidden', m !== mode);
                document.getElementById(`mode-${m}`).classList.toggle('flex', m === mode);
                const tab = document.getElementById(`tab-${m}`);
                tab.classList.toggle('border-brand-500', m === mode);
                tab.classList.toggle('text-brand-400', m === mode);
                tab.classList.toggle('border-transparent', m !== mode);
                tab.classList.toggle('text-slate-300', m !== mode);
            });
            if (mode === 'script') loadScripts();
            if (mode === 'snippet') renderSnippets();
        }

        function quickCmd(cmd) { document.getElementById('commandInput').value = cmd; }

        // ===========================
        // 代码片段收藏
        // ===========================
        async function loadSnippets() {
            try { const r = await fetch('/api/snippets'); snippets = await r.json(); } catch (e) { }
            renderSnippets();
        }

        function renderSnippets() {
            const el = document.getElementById('snippetList');
            if (!snippets.length) { el.innerHTML = '<span class="text-[11px] text-dark-600">暂无收藏</span>'; return; }
            el.innerHTML = snippets.map(s => `
        <div class="flex items-center gap-1 px-2 py-1 rounded-lg bg-dark-800 hover:bg-dark-700 cursor-pointer transition group" onclick="loadSnippet('${esc(s.name)}')">
            <i class="fas fa-star text-[9px] text-amber-400"></i>
            <span class="text-[11px] text-dark-300 group-hover:text-white">${esc(s.name)}</span>
            <button onclick="event.stopPropagation();deleteSnippet('${s.id}')" class="ml-0.5 p-0.5 rounded text-dark-600 hover:text-red-400 transition opacity-0 group-hover:opacity-100"><i class="fas fa-times text-[9px]"></i></button>
        </div>
    `).join('');
        }

        function showSaveSnippetModal() {
            const content = document.getElementById('snippetInput').value.trim();
            if (!content) return showToast('请先编写代码', 'error');
            showModal('saveSnippetModal');
            document.getElementById('snippetName').focus();
        }

        async function doSaveSnippet() {
            const name = document.getElementById('snippetName').value.trim();
            const content = document.getElementById('snippetInput').value;
            if (!name) return showToast('请输入片段名', 'error');
            try {
                await fetch('/api/snippets', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, content }) });
                showToast(`已收藏 "${name}"`);
                closeModal('saveSnippetModal');
                document.getElementById('snippetName').value = '';
                await loadSnippets();
            } catch (e) { showToast('收藏失败', 'error'); }
        }

        function loadSnippet(name) {
            const s = snippets.find(s => s.name === name);
            if (s) { document.getElementById('snippetInput').value = s.content; showToast(`已加载 "${name}"`, 'info'); }
        }

        async function deleteSnippet(id) {
            try { await fetch(`/api/snippets/${id}`, { method: 'DELETE' }); showToast('已取消收藏'); await loadSnippets(); } catch (e) { }
        }

        // ===========================
        // 脚本管理
        // ===========================
        async function loadScripts() {
            try {
                const r = await fetch('/api/scripts');
                const scripts = await r.json();
                renderScriptList(scripts);
            } catch (e) { }
        }

        function renderScriptList(scripts) {
            const el = document.getElementById('scriptList');
            if (!scripts.length) { el.innerHTML = '<div class="text-center text-dark-600 text-[11px] py-3">脚本库为空</div>'; return; }
            el.innerHTML = scripts.map(s => `
        <div class="flex items-center gap-2 px-2.5 py-1.5 rounded-lg cursor-pointer transition group
            ${currentScript === s.name ? 'bg-brand-500/15 border border-brand-500/30' : 'hover:bg-dark-800 border border-transparent'}"
            onclick="selectScript('${esc(s.name)}')">
            <i class="fas fa-file-code text-xs ${currentScript === s.name ? 'text-brand-400' : 'text-slate-400'}"></i>
            <div class="flex-1 min-w-0">
                <div class="text-xs font-mono ${currentScript === s.name ? 'text-brand-300' : 'text-white'}">${s.name}</div>
                <div class="text-[10px] text-dark-600">${(s.size / 1024).toFixed(1)} KB</div>
            </div>
            <button onclick="event.stopPropagation();deleteScriptFile('${esc(s.name)}')" class="p-0.5 rounded text-dark-600 hover:text-red-400 transition opacity-0 group-hover:opacity-100" title="删除">
                <i class="fas fa-trash text-[10px]"></i>
            </button>
        </div>
    `).join('');
        }

        async function selectScript(name) {
            currentScript = name;
            try { const r = await fetch(`/api/scripts/${name}`); const d = await r.json(); document.getElementById('scriptPreview').value = d.content; loadScripts(); } catch (e) { }
        }

        async function deleteScriptFile(name) {
            if (!confirm(`删除脚本 ${name}？`)) return;
            try { await fetch(`/api/scripts/${name}`, { method: 'DELETE' }); showToast(`已删除 ${name}`); if (currentScript === name) { currentScript = ''; document.getElementById('scriptPreview').value = ''; } loadScripts(); } catch (e) { }
        }

        async function uploadScripts(files) {
            if (!files.length) return;
            let count = 0;
            for (const file of files) {
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const r = await fetch('/api/scripts/upload', { method: 'POST', body: formData });
                    if (r.ok) count++;
                } catch (e) { }
            }
            showToast(`已上传 ${count} 个脚本`);
            document.getElementById('scriptUpload').value = '';
            loadScripts();
        }

        // ===========================
        // 执行
        // ===========================
        async function executeTask() {
            if (!selectedIds.size) return showToast('请先选择服务器', 'error');

            let payload = { server_ids: [...selectedIds], mode: currentMode, timeout: 120 };
            if (currentMode === 'command') {
                payload.command = document.getElementById('commandInput').value.trim();
                if (!payload.command) return showToast('请输入命令', 'error');
            } else if (currentMode === 'snippet') {
                payload.command = document.getElementById('snippetInput').value.trim();
                payload.mode = 'script';
                if (!payload.command) return showToast('请编写代码', 'error');
            } else if (currentMode === 'script') {
                payload.script_name = currentScript;
                if (!payload.script_name) return showToast('请选择脚本', 'error');
            }

            const btn = document.getElementById('btnExecute');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1.5"></i>执行中...'; btn.classList.add('opacity-70');

            try {
                const r = await fetch('/api/execute', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const d = await r.json();
                if (r.ok) { showToast(`任务已提交: ${selectedIds.size} 台`, 'info'); startPolling(d.task_id); }
                else { showToast(d.error, 'error'); resetBtn(); }
            } catch (e) { showToast('提交失败', 'error'); resetBtn(); }
        }

        function resetBtn() { const b = document.getElementById('btnExecute'); b.disabled = false; b.innerHTML = '<i class="fas fa-play mr-1.5"></i>执行'; b.classList.remove('opacity-70'); }

        function startPolling(taskId) {
            document.getElementById('resultPanel').innerHTML = '<div class="text-center py-10 animate-fade"><i class="fas fa-spinner fa-spin text-2xl text-brand-400 mb-3 block"></i><p class="text-xs text-slate-300">执行中...</p></div>';
            document.getElementById('resultSummary').textContent = '运行中...';
            if (pollingTimer) clearInterval(pollingTimer);
            pollingTimer = setInterval(async () => {
                try {
                    const r = await fetch(`/api/tasks/${taskId}`);
                    const task = await r.json();
                    renderResults(task);
                    if (task.status === 'done') {
                        clearInterval(pollingTimer); pollingTimer = null; resetBtn();
                        const ok = task.results.filter(r => r.status === 'success').length;
                        const fail = task.results.filter(r => r.status === 'failed').length;
                        showToast(`完成: ${ok} 成功, ${fail} 失败`, fail > 0 ? 'error' : 'success');
                    }
                } catch (e) { }
            }, 800);
        }

        function renderResults(task) {
            const panel = document.getElementById('resultPanel');
            const ok = task.results.filter(r => r.status === 'success').length;
            const fail = task.results.filter(r => r.status === 'failed').length;
            const wait = task.total - task.completed;

            document.getElementById('resultSummary').innerHTML =
                `<span class="text-green-400">${ok}✓</span> <span class="text-red-400">${fail}✗</span>` +
                (wait > 0 ? ` <span class="text-yellow-400">${wait}⏳</span>` : '') + ` / ${task.total}`;

            panel.innerHTML = task.results.map(r => {
                const s = r.status === 'success';
                const preview = (r.output || r.error || '').split('\n').filter(l => l.trim()).slice(0, 2).join('\n') || '(无输出)';
                return `<div class="rounded-lg p-2.5 border animate-fade cursor-pointer
            ${s ? 'border-green-900/30 bg-green-950/20 hover:bg-green-950/40' : 'border-red-900/30 bg-red-950/20 hover:bg-red-950/40'}"
            onclick="showDetail('${r.host}:${r.port}', ${JSON.stringify(JSON.stringify(r.output || ''))}, ${JSON.stringify(JSON.stringify(r.error || ''))}, ${r.exit_code})">
            <div class="flex items-center gap-2 mb-1">
                <i class="fas ${s ? 'fa-check text-green-400' : 'fa-times text-red-400'} text-[10px]"></i>
                <span class="text-xs font-mono text-white">${r.host}<span class="text-slate-400">:${r.port}</span></span>
                <span class="ml-auto text-[10px] text-slate-400">${r.duration}s</span>
            </div>
            <pre class="text-[10px] text-slate-400 font-mono truncate pl-5">${esc(preview)}</pre>
        </div>`;
            }).join('');

            if (wait > 0) {
                panel.innerHTML += `<div class="rounded-lg p-2.5 border border-dark-700/30 bg-dark-800/30 flex items-center gap-2">
            <i class="fas fa-spinner fa-spin text-[10px] text-yellow-400"></i><span class="text-xs text-slate-300">${wait} 台等待中...</span></div>`;
            }
        }

        function showDetail(title, output, error, exitCode) {
            document.getElementById('detailTitle').innerHTML =
                `<i class="fas fa-terminal text-brand-400 mr-2"></i>${title}` +
                `<span class="text-xs ml-2 px-1.5 py-0.5 rounded ${exitCode === 0 ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">exit: ${exitCode}</span>`;
            let c = '';
            if (output) c += output;
            if (error) c += '\n\n--- STDERR ---\n' + error;
            document.getElementById('detailOutput').textContent = c || '(无输出)';
            showModal('detailModal');
        }
    </script>
</body>

</html>
